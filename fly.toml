# Fly.io configuration for WayCore worker
# Deploy: fly launch --no-deploy && fly secrets set ... && fly deploy
#
# Required secrets (set via `fly secrets set`):
#   ENCRYPTION_KEY, ANTHROPIC_API_KEY, DATABASE_URL, RESTATE_INGRESS_URL

app = "waycore-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SCREENSHOT_BACKEND = "s3"
  PLAYWRIGHT_HEADFUL = "0"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 4
    hard_limit = 8

[[http_service.checks]]
  grace_period = "15s"
  interval = "15s"
  method = "GET"
  path = "/restate/health"
  timeout = "5s"

[[vm]]
  size = "performance-2x"
  memory = "2gb"
  cpus = 2
